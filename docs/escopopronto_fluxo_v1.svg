<svg width="100%" viewBox="0 0 680 1080" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Fluxo completo EscopoCerto v2</title>
<desc>Fluxo com persistência, versionamento, status, auditoria e segurança</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
  svg { background: #fff; font-family: Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
  .ts { font-size: 12px; fill: #555; }
  .arr { stroke: #888; stroke-width: 1.2; fill: none; }
  .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th   { fill: #085041; }
  .c-teal .ts   { fill: #0F6E56; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th  { fill: #3C3489; }
  .c-purple .ts  { fill: #534AB7; }
  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th  { fill: #633806; }
  .c-amber .ts  { fill: #854F0B; }
  .c-gray rect  { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th   { fill: #2C2C2A; }
  .c-gray .ts   { fill: #5F5E5A; }
</style>

<text class="ts" x="100" y="28" text-anchor="middle" style="font-weight:600;fill:#333">Comercial</text>
<text class="ts" x="340" y="28" text-anchor="middle" style="font-weight:600;fill:#333">Sistema</text>
<text class="ts" x="580" y="28" text-anchor="middle" style="font-weight:600;fill:#333">Supervisor</text>

<line x1="100" y1="34" x2="100" y2="1060" stroke="#ddd" stroke-width="1" stroke-dasharray="4 4"/>
<line x1="340" y1="34" x2="340" y2="1060" stroke="#ddd" stroke-width="1" stroke-dasharray="4 4"/>
<line x1="580" y1="34" x2="580" y2="1060" stroke="#ddd" stroke-width="1" stroke-dasharray="4 4"/>

<g class="c-gray"><rect x="40" y="44" width="120" height="40" rx="8" stroke-width="0.5"/><text class="th" x="100" y="64" text-anchor="middle" dominant-baseline="central">Login</text></g>
<line x1="100" y1="84" x2="100" y2="106" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal"><rect x="40" y="106" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="100" y="124" text-anchor="middle" dominant-baseline="central">Novo briefing</text><text class="ts" x="100" y="142" text-anchor="middle" dominant-baseline="central">Preenche formulário</text></g>
<rect x="168" y="118" width="64" height="18" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/><text x="200" y="131" text-anchor="middle" style="font-size:10px;fill:#888">rascunho</text>
<line x1="160" y1="131" x2="280" y2="155" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="280" y="144" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="340" y="162" text-anchor="middle" dominant-baseline="central">RAG + IA</text><text class="ts" x="340" y="180" text-anchor="middle" dominant-baseline="central">Gera escopo</text></g>
<rect x="408" y="156" width="78" height="18" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text x="447" y="169" text-anchor="middle" style="font-size:10px;fill:#3C3489">processando</text>
<line x1="340" y1="194" x2="340" y2="218" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber"><rect x="280" y="218" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="340" y="236" text-anchor="middle" dominant-baseline="central">Erro na IA?</text><text class="ts" x="340" y="254" text-anchor="middle" dominant-baseline="central">Fallback+retry(2x)+flag</text></g>
<line x1="280" y1="243" x2="210" y2="243" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text x="243" y="237" text-anchor="middle" style="font-size:11px;fill:#888">falha</text>
<g class="c-gray"><rect x="40" y="218" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="100" y="236" text-anchor="middle" dominant-baseline="central">Reprocessar</text><text class="ts" x="100" y="254" text-anchor="middle" dominant-baseline="central">Nova versão (v2, v3...)</text></g>
<line x1="340" y1="268" x2="340" y2="292" class="arr" marker-end="url(#arrow)"/>
<text x="356" y="283" text-anchor="start" style="font-size:11px;fill:#888">sucesso</text>

<g class="c-purple"><rect x="280" y="292" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="340" y="310" text-anchor="middle" dominant-baseline="central">PostgreSQL</text><text class="ts" x="340" y="328" text-anchor="middle" dominant-baseline="central">Salva escopo v1 + status</text></g>
<line x1="340" y1="342" x2="340" y2="366" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal"><rect x="40" y="366" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="100" y="384" text-anchor="middle" dominant-baseline="central">Revisa escopo</text><text class="ts" x="100" y="402" text-anchor="middle" dominant-baseline="central">v1 salva</text></g>
<rect x="168" y="378" width="64" height="18" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/><text x="200" y="391" text-anchor="middle" style="font-size:10px;fill:#888">gerado</text>
<line x1="280" y1="391" x2="160" y2="391" class="arr" marker-end="url(#arrow)"/>
<line x1="100" y1="416" x2="100" y2="440" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal"><rect x="40" y="440" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="100" y="458" text-anchor="middle" dominant-baseline="central">Envia para</text><text class="ts" x="100" y="476" text-anchor="middle" dominant-baseline="central">aprovação</text></g>
<line x1="160" y1="465" x2="280" y2="465" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="280" y="440" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="340" y="458" text-anchor="middle" dominant-baseline="central">Token UUID</text><text class="ts" x="340" y="476" text-anchor="middle" dominant-baseline="central">hash+expiração+uso único</text></g>
<rect x="408" y="452" width="80" height="18" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/><text x="448" y="465" text-anchor="middle" style="font-size:10px;fill:#633806">em aprovação</text>
<line x1="340" y1="490" x2="340" y2="514" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="280" y="514" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="340" y="532" text-anchor="middle" dominant-baseline="central">E-mail enviado</text><text class="ts" x="340" y="550" text-anchor="middle" dominant-baseline="central">Gmail API</text></g>
<text x="340" y="572" text-anchor="middle" style="font-size:10px;font-style:italic;fill:#aaa">notificação assíncrona</text>
<line x1="400" y1="539" x2="520" y2="539" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="520" y="514" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="580" y="532" text-anchor="middle" dominant-baseline="central">Recebe e-mail</text><text class="ts" x="580" y="550" text-anchor="middle" dominant-baseline="central">Clica no link</text></g>
<line x1="580" y1="564" x2="580" y2="590" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="280" y="590" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="340" y="608" text-anchor="middle" dominant-baseline="central">Valida token</text><text class="ts" x="340" y="626" text-anchor="middle" dominant-baseline="central">hash+expiração+uso único</text></g>
<line x1="520" y1="615" x2="400" y2="615" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="520" y="590" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="580" y="608" text-anchor="middle" dominant-baseline="central">Tela aprovação</text><text class="ts" x="580" y="626" text-anchor="middle" dominant-baseline="central">Vê escopo completo</text></g>
<line x1="340" y1="640" x2="340" y2="664" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber"><rect x="280" y="664" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="340" y="682" text-anchor="middle" dominant-baseline="central">Decisão</text><text class="ts" x="340" y="700" text-anchor="middle" dominant-baseline="central">Aprovar/Ajustar/Recusar</text></g>
<line x1="520" y1="640" x2="520" y2="689" stroke="#888" stroke-width="1"/>
<line x1="520" y1="689" x2="400" y2="689" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="714" x2="340" y2="738" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="280" y="738" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="340" y="756" text-anchor="middle" dominant-baseline="central">Log de auditoria</text><text class="ts" x="340" y="774" text-anchor="middle" dominant-baseline="central">quem+quando+o quê</text></g>
<line x1="340" y1="788" x2="340" y2="812" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="280" y="812" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="340" y="830" text-anchor="middle" dominant-baseline="central">Atualiza status</text><text class="ts" x="340" y="848" text-anchor="middle" dominant-baseline="central">PostgreSQL + timestamp</text></g>
<rect x="408" y="824" width="76" height="18" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/><text x="446" y="837" text-anchor="middle" style="font-size:10px;fill:#27500A">aprovado</text>
<line x1="280" y1="837" x2="160" y2="837" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal"><rect x="40" y="812" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="100" y="830" text-anchor="middle" dominant-baseline="central">Vê resultado</text><text class="ts" x="100" y="848" text-anchor="middle" dominant-baseline="central">Dashboard / histórico</text></g>

<rect x="20" y="884" width="640" height="90" rx="8" fill="none" stroke="#ddd" stroke-width="0.5"/>
<text x="36" y="902" style="font-size:12px;font-weight:600;fill:#333">Legenda</text>
<rect x="100" y="892" width="10" height="10" rx="2" fill="#f5f5f5" stroke="#ccc"/><text x="116" y="902" style="font-size:11px;fill:#555">status do ciclo de vida</text>
<rect x="260" y="892" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7"/><text x="276" y="902" style="font-size:11px;fill:#555">Sistema / IA / Banco</text>
<rect x="420" y="892" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56"/><text x="436" y="902" style="font-size:11px;fill:#555">Comercial</text>
<rect x="510" y="892" width="10" height="10" rx="2" fill="#F1EFE8" stroke="#5F5E5A"/><text x="526" y="902" style="font-size:11px;fill:#555">Supervisor</text>
<rect x="590" y="892" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B"/><text x="606" y="902" style="font-size:11px;fill:#555">Decisão</text>
<text x="36" y="924" style="font-size:11px;fill:#888">Token: hash + expiração 48h + uso único — dados sensíveis nunca no e-mail</text>
<text x="36" y="942" style="font-size:11px;fill:#888">Auditoria: toda decisão registrada com ator, timestamp e versão do escopo</text>
<text x="36" y="960" style="font-size:11px;fill:#888">Versionamento: cada geração cria nova versão (v1, v2...) — nunca sobrescreve</text>
</svg>
